<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#1a140c}
.stage{position:relative;width:100%;height:100vh;overflow:hidden;
  display:flex;align-items:center;justify-content:center}

/* 卷轴：放大！绢面铺满大半屏。卷轴本身放大到 ~130% 高，绢面顶满竖屏 */
.scroll-wrap{position:absolute;inset:0;overflow:hidden}
.scroll-img{position:absolute;left:50%;top:50%;
  height:132vh;width:auto;transform:translate(-50%,-50%) scale(1);
  transform-origin:center;
  opacity:0;animation:scrollIn 1.8s ease-out .2s forwards}
@keyframes scrollIn{from{opacity:0;transform:translate(-50%,-50%) scale(.96)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}}

/* 文字区：盖在放大后的绢面留白上（卷轴放大132vh后，绢面在屏占比更大） */
.ink{position:absolute;top:17%;bottom:20%;left:20%;right:20%;
  display:flex;flex-direction:row-reverse;   /* 列从右往左 */
  align-items:flex-start;justify-content:center;gap:6%;
  pointer-events:none}
.col{writing-mode:vertical-rl;text-orientation:upright;
  font-family:"Songti SC","STSong","STKaiti",serif;
  font-size:clamp(19px,5.6vw,27px);line-height:1.95;letter-spacing:5px;
  color:#4a3210;                              /* 墨褐：落在米黄绢面上，读得清 */
  text-shadow:0 1px 0 rgba(255,250,235,.5);
  max-height:100%;
  opacity:0}
.col.show{animation:inkIn 2.4s ease-out forwards}
@keyframes inkIn{0%{opacity:0;transform:translateY(8px);filter:blur(3px)}
  100%{opacity:1;transform:translateY(0);filter:blur(0)}}

.skip{position:absolute;right:16px;bottom:14px;z-index:5;
  font-family:"Songti SC",serif;font-size:12px;letter-spacing:2px;
  color:rgba(255,240,210,.55);border:1px solid rgba(255,235,190,.28);
  padding:5px 11px;border-radius:13px;background:rgba(0,0,0,.2)}
</style></head><body>
<div class="stage">
  <div class="scroll-wrap">
    <img class="scroll-img" src="视觉素材/卷轴_竖_空白.jpg" alt="">
    <div class="ink">
      <div class="col" id="c1">宇宙洪荒，一片混沌。无尽的黑洞之中，似有秩序，似有数列、逻辑、与熵。</div>
      <div class="col" id="c2">混沌里浮起一些跃影，是宇宙的反射，是星体的化身。先于光，先于名，本就在那里。</div>
    </div>
  </div>
  <div class="skip" id="skip">跳过 ›</div>
</div>
<script>
(function(){
  var c1=document.getElementById('c1'), c2=document.getElementById('c2');
  function play(){
    c1.classList.remove('show'); c2.classList.remove('show');
    void c1.offsetWidth; void c2.offsetWidth;
    setTimeout(function(){ c1.classList.add('show'); }, 1400);
    setTimeout(function(){ c2.classList.add('show'); }, 4200);
  }
  play();
  document.getElementById('skip').addEventListener('click',play);
})();
</script>
</body></html>
