<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
.stage{position:relative;width:100%;height:100vh;overflow:hidden}
/* 背景：仙阁全景，证明金光浮字不挡背景 */
.bg{position:absolute;inset:0;background:url(视觉素材/IMG_6522.JPG) center/cover no-repeat;
  transform:scale(1.05);animation:slowpush 24s ease-in-out infinite alternate}
@keyframes slowpush{from{transform:scale(1.05)}to{transform:scale(1.12)}}
/* 轻微压暗，让金字浮得起来（但背景仍清晰可见=两不误） */
.veil{position:absolute;inset:0;background:radial-gradient(120% 90% at 50% 40%, transparent 35%, rgba(20,12,0,.28) 100%);pointer-events:none}

/* 金光浮字层：竖排、从右往左 */
.scroll{position:absolute;inset:0;z-index:2;
  display:flex;flex-direction:row-reverse;   /* 从右往左排列每一句 */
  align-items:flex-start;justify-content:center;gap:34px;
  padding:9vh 6vw;pointer-events:none}
.col{writing-mode:vertical-rl;text-orientation:upright;   /* 竖排 */
  font-family:"Songti SC","STSong",serif;
  font-size:23px;line-height:2.05;letter-spacing:6px;
  color:#ffe9b0;
  /* 金光：字本身的辉光 */
  text-shadow:0 0 8px rgba(255,225,150,.9),0 0 20px rgba(255,205,100,.55),0 0 40px rgba(255,190,70,.3);
  opacity:0;filter:blur(5px);
  max-height:82vh}
/* 句子依次浮现：淡入→停→（最后一句留住，前面的轻轻隐去也行，这里先都留） */
.col.show{animation:floatIn 2.6s ease-out forwards}
@keyframes floatIn{
  0%{opacity:0;filter:blur(6px);transform:translateY(10px)}
  100%{opacity:1;filter:blur(0);transform:translateY(0)}
}
/* 跳过小口子（克制） */
.skip{position:absolute;right:18px;bottom:16px;z-index:3;
  font-family:"Songti SC",serif;font-size:13px;letter-spacing:2px;
  color:rgba(255,240,210,.6);border:1px solid rgba(255,235,190,.3);
  padding:5px 12px;border-radius:14px;background:rgba(0,0,0,.15);
  backdrop-filter:blur(2px)}
</style></head><body>
<div class="stage">
  <div class="bg"></div>
  <div class="veil"></div>
  <div class="scroll" id="scroll">
    <!-- 从右往左：第一句在最右，第二句在左 -->
    <div class="col" id="c1">宇宙洪荒，一片混沌。无尽的黑洞之中，似有秩序，似有数列、逻辑、与熵。</div>
    <div class="col" id="c2">混沌里浮起一些跃影——它们是宇宙的反射，是星体的化身。先于光，先于名，本就在那里。</div>
  </div>
  <div class="skip" id="skip">跳过 ›</div>
</div>
<script>
(function(){
  // 依次浮现：第一句(最右) → 2.2s后第二句
  var c1=document.getElementById('c1'), c2=document.getElementById('c2');
  setTimeout(function(){ c1.classList.add('show'); }, 500);
  setTimeout(function(){ c2.classList.add('show'); }, 2900);
  // 跳过：点了重头再演（小样用，方便反复看）
  document.getElementById('skip').addEventListener('click',function(){
    c1.classList.remove('show'); c2.classList.remove('show');
    void c1.offsetWidth; void c2.offsetWidth;
    setTimeout(function(){ c1.classList.add('show'); }, 300);
    setTimeout(function(){ c2.classList.add('show'); }, 2700);
  });
})();
</script>
</body></html>
