<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>玄玑 · Astrology</title>
<style>
  :root{
    /* 中式墨色绢本风：玄青/黛紫底 + 月白 + 鎏金 */
    --bg:#0b0d14; --card:rgba(232,224,205,.04); --ink:#ece6d6; --soft:#9c9483;
    --accent:#9d7fb8; --accent2:#caa15a; --line:rgba(202,161,90,.16); --good:#8fbf9e; --warn:#c98f9a;
    --gold:#caa15a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang SC",sans-serif;color:var(--ink);padding:20px;line-height:1.7;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(1px 1px at 22% 28%, rgba(236,230,214,.55), transparent),
      radial-gradient(1.5px 1.5px at 78% 38%, rgba(202,161,90,.55), transparent),
      radial-gradient(1px 1px at 38% 68%, rgba(236,230,214,.35), transparent),
      radial-gradient(1px 1px at 72% 76%, rgba(202,161,90,.35), transparent),
      radial-gradient(1000px 680px at 72% -8%, #241d33 0%, transparent 62%),
      radial-gradient(820px 720px at 8% 104%, #14202a 0%, transparent 56%),
      linear-gradient(165deg,#0b0d14,#10131c,#0b0e13);
    background-attachment:fixed;min-height:100vh;
  }
  .wrap{max-width:680px;margin:0 auto}
  h1{font-size:31px;font-weight:600;text-align:center;margin-bottom:6px;letter-spacing:8px;
     font-family:"Songti SC","STSong",serif;
     background:linear-gradient(120deg,#caa15a,#f0e3c2,#9d7fb8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
     text-shadow:0 0 30px rgba(202,161,90,.18)}
  .sub{text-align:center;color:var(--soft);font-size:13px;margin-bottom:22px;letter-spacing:2px}
  .tabs{display:flex;gap:8px;justify-content:center;margin-bottom:16px}
  .tab{padding:7px 18px;border-radius:20px;background:var(--card);color:var(--soft);cursor:pointer;font-size:14px;border:1px solid var(--line);transition:.2s;user-select:none}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(169,143,216,.3)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 22px;margin-bottom:14px;backdrop-filter:blur(8px);box-shadow:0 8px 32px rgba(0,0,0,.25)}
  .card h2{font-size:15px;margin-bottom:12px;color:var(--gold);display:flex;align-items:center;gap:6px;letter-spacing:1px}
  .planet{display:flex;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:15px}
  .planet:last-child{border:0}
  .pname{width:52px;color:var(--soft)}
  .ppos{flex:1;font-weight:500;color:var(--ink)}
  .rx{color:var(--warn);font-size:12px;background:rgba(224,160,184,.15);padding:1px 7px;border-radius:8px}
  .aspects{font-size:13px;color:var(--soft);line-height:2}
  .asp-tag{display:inline-block;padding:2px 9px;border-radius:8px;margin:2px;background:rgba(201,168,255,.12);color:var(--ink)}
  .asp-good{background:rgba(143,216,176,.15);color:var(--good)} .asp-hard{background:rgba(224,160,184,.15);color:var(--warn)}
  .btn{display:block;width:100%;padding:14px;margin-top:12px;border:0;border-radius:12px;background:linear-gradient(120deg,#9d7fb8,#caa15a);color:#1c160e;font-size:16px;font-weight:600;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 20px rgba(201,168,255,.25)}
  .btn:active{opacity:.8}
  .datebar{display:flex;align-items:center;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;font-size:13px;color:var(--soft)}
  .datebar input[type=date]{border:1px solid var(--line);border-radius:10px;padding:5px 10px;font-size:14px;color:var(--ink);background:var(--card)}
  .quick{padding:4px 12px;border-radius:14px;background:var(--card);border:1px solid var(--line);cursor:pointer;color:var(--soft);transition:.15s}
  .quick:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
  .foot{text-align:center;color:var(--soft);font-size:11px;margin-top:20px;opacity:.7;letter-spacing:1px}
  /* —— 我的盘 —— */
  .form-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:14px;flex-wrap:wrap}
  .form-row label{width:72px;color:var(--soft);flex-shrink:0}
  .form-row input,.form-row select{flex:1;min-width:110px;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:14px;color:var(--ink);background:rgba(255,255,255,.06)}
  .form-row input::-webkit-calendar-picker-indicator{filter:invert(.7)}
  .form-row option{background:#14161e;color:var(--ink)}
  .seg{display:flex;gap:8px;flex:1}
  .seg .opt{flex:1;text-align:center;padding:9px;border:1px solid var(--line);border-radius:10px;cursor:pointer;color:var(--soft);user-select:none;transition:.15s}
  .seg .opt.on{background:linear-gradient(120deg,#9d7fb8,#caa15a);color:#1c160e;border-color:transparent;font-weight:600}
  .hint{font-size:12px;color:var(--soft);background:rgba(201,168,255,.08);border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:12px;line-height:1.6}
  .latlon{display:none;gap:8px}
  .big3{display:flex;justify-content:space-around;text-align:center;background:linear-gradient(135deg,rgba(201,168,255,.12),rgba(232,201,118,.1));border:1px solid var(--line);border-radius:14px;padding:18px 10px;margin-bottom:8px}
  .big3 .b3{flex:1}
  .big3 .b3 .lbl{font-size:12px;color:var(--soft);margin-bottom:5px}
  .big3 .b3 .val{font-size:17px;font-weight:700;color:var(--gold)}
  .axis{display:flex;flex-wrap:wrap;gap:8px;font-size:13px}
  .axis .ax{background:rgba(201,168,255,.1);border:1px solid var(--line);border-radius:8px;padding:5px 11px;color:var(--ink)}
  .house-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;font-size:13px}
  .house-grid .hc{border-bottom:1px solid var(--line);padding:6px 0;display:flex;gap:8px}
  .house-grid .hc .hn{color:var(--gold);font-weight:600;width:38px}
  .house-grid .hc .hp{color:var(--soft);font-size:12px}
  .role-card{text-align:center;background:linear-gradient(160deg,rgba(42,31,77,.7),rgba(58,47,93,.6));border:1px solid rgba(232,201,118,.3);border-radius:16px;padding:24px 20px;color:#f0ebf8;margin:8px 0;box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .role-card .rname{font-size:22px;font-weight:700;color:#caa15a;letter-spacing:2px;margin-bottom:6px;text-shadow:0 0 20px rgba(232,201,118,.3)}
  .role-card .rtype{font-size:13px;color:#c9bce0;margin-bottom:12px;letter-spacing:1px}
  .role-card .rdesc{font-size:15px;line-height:1.9;color:#ded6ee}
  .ask-card{text-align:center;background:linear-gradient(160deg,rgba(232,201,118,.1),rgba(201,168,255,.08));border:1px solid rgba(232,201,118,.35);border-radius:16px;padding:22px 20px;margin-top:18px}
  .ask-card .ask-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
  .ask-card .ask-desc{font-size:13.5px;line-height:1.9;color:var(--soft);margin-bottom:8px}
  .ask-qr{display:flex;align-items:center;justify-content:center;gap:18px;margin:16px 0 6px;flex-wrap:wrap}
  .ask-qr .qr-img{width:175px;border-radius:14px;background:#fff;padding:12px;box-shadow:0 4px 18px rgba(0,0,0,.35)}
  .ask-qr .qr-text{text-align:left;font-size:14px;line-height:1.6;color:var(--gold);font-weight:600;letter-spacing:.5px}
  .ask-qr .qr-text .qr-sub{font-size:11.5px;color:var(--soft);font-weight:400;line-height:1.5;display:inline-block;margin-top:6px}
  .ask-card .ask-or{font-size:12px;color:var(--soft);letter-spacing:3px;margin:12px 0 12px;opacity:.6}
  .read-card{margin-top:18px;padding:20px 18px;border-radius:18px;background:linear-gradient(160deg,rgba(169,143,216,.14),rgba(40,30,70,.25));border:1px solid var(--line);text-align:center}
  .read-card .ask-title{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:1px}
  .read-card .ask-desc{font-size:13.5px;line-height:1.9;color:var(--soft);margin-bottom:14px}
  .read-btn{font-size:15px}
  .read-by{font-size:11.5px;color:var(--soft);letter-spacing:2px;margin-top:9px;opacity:.7}
  .read-out{margin-top:18px;text-align:left;font-size:14.5px;line-height:1.95;color:var(--text,#e8e4f3);white-space:pre-wrap;word-break:break-word;background:rgba(20,16,38,.5);border-radius:14px;padding:18px 16px;border:1px solid var(--line);min-height:40px}
  .read-out .typing{display:inline-block;width:7px;height:15px;background:var(--gold);margin-left:2px;animation:blink 1s steps(2) infinite;vertical-align:text-bottom}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .read-hook{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);font-size:13px;color:var(--gold);line-height:1.8}
  /* Markdown 渲染样式(神仙虾解读) */
  .md-body{white-space:normal}
  .md-fadein{animation:mdFade 1.1s ease}
  @keyframes mdFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .md-body .md-h{font-weight:700;color:var(--gold);letter-spacing:.5px;line-height:1.5}
  .md-body .md-h1{font-size:18px;margin:20px 0 10px}
  .md-body .md-h2{font-size:16px;margin:18px 0 9px}
  .md-body .md-h3{font-size:15px;margin:15px 0 8px;color:var(--accent2,#c9b6f0)}
  .md-body .md-h4{font-size:14px;margin:13px 0 7px;color:var(--accent2,#c9b6f0)}
  .md-body .md-p{margin:9px 0;line-height:1.95}
  .md-body strong{color:var(--gold);font-weight:700}
  .md-body em{color:var(--accent2,#c9b6f0);font-style:normal}
  .md-body .md-ul{margin:8px 0;padding-left:20px}
  .md-body .md-ul li{margin:5px 0;line-height:1.85}
  .md-body .md-q{margin:12px 0;padding:10px 14px;border-left:3px solid var(--gold);background:rgba(169,143,216,.1);border-radius:0 8px 8px 0;color:var(--gold);font-size:15px;line-height:1.8}
  .md-body .md-hr{border:none;border-top:1px solid var(--line);margin:16px 0;opacity:.5}

  /* ===== 观照镜皮肤（预览版·神仙虾背景＋玻璃拟态，不动算法） ===== */
  @font-face{font-family:"beiwei";src:url("字体子集/北魏楷书_玄玑.woff2") format("woff2");font-display:swap}
  body{
    background:#0b0912 !important;   /* 兜底底色 */
    position:relative;
  }
  /* 神仙虾撩水图：固定背景层(真实div，便于JS换图)。上半留脸、下半渐暗托表单 */
  .skinbg{content:"";position:fixed;inset:0;z-index:-2;
    background:url(视觉素材/观照_撩水.webp) center top/cover no-repeat;
    transition:opacity .9s ease;opacity:1}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:linear-gradient(to bottom,
      rgba(10,8,18,.15) 0%, rgba(10,8,18,.15) 32%,
      rgba(10,8,18,.55) 52%, rgba(8,6,14,.9) 100%);}
  /* 预览版只看排盘：藏掉群运营 tab 栏与日期条 */
  .tabs,.datebar{display:none !important}
  /* 卡片玻璃拟态 */
  .card{background:rgba(16,12,26,.5) !important;border:1px solid rgba(235,210,150,.22) !important;
    backdrop-filter:blur(9px) !important;box-shadow:0 10px 44px rgba(0,0,0,.55) !important;
    margin-top:46vh;}   /* 往下推，露出上方神仙虾的脸 */
  /* 观照镜标题：北魏楷书金字 */
  .card h2.natal-ttl{font-family:"beiwei",serif !important;display:flex !important;justify-content:center !important;text-align:center !important;width:100%;letter-spacing:6px;
    font-size:22px !important;
    background:none !important;-webkit-text-fill-color:#ffe6a8 !important;color:#ffe6a8 !important;
    text-shadow:0 0 14px rgba(255,210,120,.6);margin-bottom:4px}
  .natal-lead{text-align:center;color:rgba(248,242,228,.66);font-size:12.5px;letter-spacing:1px;margin-bottom:16px}
  /* 表单控件透明仙气化 */
  #natalForm input,#natalForm select{background:rgba(255,255,255,.07) !important;
    color:#fbf7ee !important;border:1px solid rgba(235,210,150,.26) !important;border-radius:12px !important}
  #natalForm input::-webkit-calendar-picker-indicator{filter:invert(.85)}
  #natalForm label{color:rgba(255,235,200,.82) !important;font-family:"beiwei",serif}
  .hint{color:rgba(248,242,228,.6) !important;background:rgba(255,255,255,.05) !important;border-radius:10px}
  .seg .opt.on{background:linear-gradient(120deg,#e8c25a,#ffe9a8) !important;color:#3a2a08 !important}
  /* 观照按钮：金光 */
  #calcNatal{font-family:"beiwei",serif !important;letter-spacing:8px !important;
    background:linear-gradient(120deg,#e8c25a,#ffe9a8 50%,#e0b34a) !important;color:#3a2a08 !important;
    box-shadow:0 6px 26px rgba(220,170,60,.5),0 0 30px rgba(255,220,120,.3) !important}
  /* 下方解读/二维码区：紫色统一改金色仙气 */
  .btn{background:linear-gradient(120deg,#e8c25a,#ffe9a8 50%,#e0b34a) !important;
    color:#3a2a08 !important;box-shadow:0 6px 22px rgba(220,170,60,.4) !important}
  .seg .opt.on{background:linear-gradient(120deg,#e8c25a,#ffe9a8) !important;color:#3a2a08 !important}
  .read-card{background:linear-gradient(160deg,rgba(232,201,118,.14),rgba(40,30,12,.3)) !important;
    border:1px solid rgba(235,210,150,.28) !important}
  .ask-card{background:linear-gradient(160deg,rgba(232,201,118,.12),rgba(40,30,12,.25)) !important;
    border:1px solid rgba(235,210,150,.35) !important}
  .big3{background:linear-gradient(135deg,rgba(232,201,118,.14),rgba(255,235,180,.08)) !important}
  .axis .ax,.asp-tag{background:rgba(235,210,150,.1) !important}
  .hint{background:rgba(235,210,150,.07) !important}

  /* ===== 功德+1 隐性机关 ===== */
  /* 触点：藏在上方神仙虾画面里(撩水的手/水花处)，克制·不明说·只在悬停时微微一亮 */
  #meritDot{position:fixed;left:50%;top:14vh;transform:translateX(-50%);
    width:160px;height:200px;border-radius:50%/40%;z-index:5;cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    /* 极淡的光晕，几乎看不见，引导好奇的人去点 */
    background:radial-gradient(circle, rgba(255,228,150,.10) 0%, transparent 68%);
    animation:meritBreathe 3.6s ease-in-out infinite}
  @keyframes meritBreathe{0%,100%{opacity:.35}50%{opacity:.8}}
  #meritDot:active{transform:translateX(-50%) scale(.9)}
  /* 浮字：点中后金字上浮淡出 */
  #meritPop{position:fixed;left:50%;top:17vh;transform:translateX(-50%);z-index:6;
    font-family:"beiwei",serif;font-size:20px;letter-spacing:3px;
    color:#ffe6a8;text-shadow:0 0 12px rgba(255,210,120,.9),0 0 26px rgba(255,190,80,.5);
    pointer-events:none;opacity:0}
  #meritPop.go{animation:meritFloat 1.25s ease-out forwards}
  @keyframes meritFloat{
    0%{opacity:0;transform:translate(-50%,6px) scale(.85)}
    18%{opacity:1;transform:translate(-50%,-2px) scale(1.05)}
    100%{opacity:0;transform:translate(-50%,-46px) scale(1)}}
</style>
</head>
<body>
<!-- 神仙虾背景双层(JS交叉淡入换图，功德+1机关用) -->
<div class="skinbg" id="skinA"></div>
<div class="skinbg" id="skinB" style="opacity:0"></div>
<!-- 功德+1 机关：克制的隐性触点(不明说，停留彩蛋)。点一下→浮「功德+1」金字+换神仙虾背景 -->
<div id="meritDot" aria-hidden="true"></div>
<div id="meritPop">功德 +1</div>
<div class="wrap">
  <div id="now" style="display:none"></div><!-- 保留占位防JS报错·不显示 -->
  <div id="view"></div>
  <!-- 对外版: prompt框隐藏(仅后台生成, 不给访客看) -->
  <div class="card" id="promptCard" style="display:none">
    <div class="prompt-box" id="prompt"></div>
    <button class="btn" id="copy">复制</button>
  </div>
  <div class="foot">玄玑 · Astrology · 星历与瑞士星历同源 · 你的出生信息只在本机计算，不上传<br>小红书 @山玉居士　·　以占星解构人性，用数学逻辑主宰人生</div>
</div>

<script src="./astronomy.js"></script>
<script src="./cities.js"></script>
<script src="./ephemeris.bundle.js"></script>
<script src="./chiron-helper.js"></script>
<script>
const A=window.Astronomy;
const SIGNS=["白羊","金牛","双子","巨蟹","狮子","处女","天秤","天蝎","射手","摩羯","水瓶","双鱼"];
const ELEMENT={白羊:"火",狮子:"火",射手:"火",金牛:"土",处女:"土",摩羯:"土",双子:"风",天秤:"风",水瓶:"风",巨蟹:"水",天蝎:"水",双鱼:"水"};
const BODIES=[["太阳",A.Body.Sun],["月亮",A.Body.Moon],["水星",A.Body.Mercury],["金星",A.Body.Venus],["火星",A.Body.Mars],["木星",A.Body.Jupiter],["土星",A.Body.Saturn],["天王",A.Body.Uranus],["海王",A.Body.Neptune],["冥王",A.Body.Pluto]];
const ASPECTS=[[0,"合",8,""],[60,"六合",4,"good"],[90,"刑",6,"hard"],[120,"拱",6,"good"],[180,"冲",8,"hard"]];

function lon(b,date){let e=A.Ecliptic(A.GeoVector(b,date,true)).elon;return e<0?e+360:e;}
function isRx(b,date){ // 用前后6小时判断顺逆
  if(b===A.Body.Sun||b===A.Body.Moon)return false;
  const t1=new Date(date.getTime()-6*3600e3),t2=new Date(date.getTime()+6*3600e3);
  let a=lon(b,t1),c=lon(b,t2),d=c-a; if(d>180)d-=360; if(d<-180)d+=360; return d<0;
}
function pos(date){return BODIES.map(([n,b])=>{const L=lon(b,date),s=Math.floor(L/30),deg=L-s*30;return{n,sign:SIGNS[s],deg:Math.floor(deg),min:Math.floor((deg%1)*60),rx:isRx(b,date),L};});}
function aspects(date){const ps=pos(date),out=[];for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){let d=Math.abs(ps[i].L-ps[j].L)%360;if(d>180)d=360-d;for(const[a,nm,orb,cls]of ASPECTS){if(Math.abs(d-a)<=orb){out.push({t:`${ps[i].n}${nm}${ps[j].n}`,cls});break;}}}return out;}

// 扫描换座 & 新月满月
function scanTransits(start,days,skipMoon){const ev=[];for(const[n,b]of BODIES){if(skipMoon&&b===A.Body.Moon)continue;let prev=Math.floor(lon(b,start)/30);for(let k=1;k<=days;k++){const d=new Date(start.getTime()+k*864e5);const cur=Math.floor(lon(b,d)/30);if(cur!==prev){ev.push({date:d,txt:`${n} 进入 ${SIGNS[cur]}座`});prev=cur;}}}return ev;}
function scanMoons(start,days){const ev=[],seen=new Set();for(let k=0;k<=days;k++){const d=new Date(start.getTime()+k*864e5);const sun=lon(A.Body.Sun,d),moon=lon(A.Body.Moon,d);let diff=(moon-sun+360)%360;if(diff<7||diff>353){const s=SIGNS[Math.floor(sun/30)];if(!seen.has("新"+s)){ev.push({date:d,txt:`🌑 新月在 ${s}座`});seen.add("新"+s);}}else if(Math.abs(diff-180)<7){const s=SIGNS[Math.floor(moon/30)];if(!seen.has("满"+s)){ev.push({date:d,txt:`🌕 满月在 ${s}座`});seen.add("满"+s);}}}return ev;}
const md=d=>`${d.getMonth()+1}/${d.getDate()}`;

function planetRows(ps){return ps.map(p=>`<div class="planet"><span class="pname">${p.n}</span><span class="ppos">${p.sign} ${p.deg}°${String(p.min).padStart(2,'0')}'</span>${p.rx?'<span class="rx">℞ 逆行</span>':''}</div>`).join('');}
function aspectTags(as){return as.map(a=>`<span class="asp-tag ${a.cls?'asp-'+a.cls:''}">${a.t}</span>`).join('');}

/* ========== 我的盘 · 本命盘自助算 ========== */

// 把"本地出生时间+时区"换成UTC的Date(必用Date.UTC, 不让浏览器按设备时区瞎猜)
function toUTC(y,mo,d,h,mi,tzOffset){
  return new Date(Date.UTC(y,mo-1,d,h,mi)-tzOffset*3600*1000);
}
// 中国夏令时(1986-1991): 每年4月中旬-9月中旬钟拨快1小时。
// 钟面时间是拨快的, 真实时间要减1小时。这里返回"需要减去的小时数"。
// 实施区间(近似官方): 每年4月第二个周日2:00 ~ 9月第二个周日2:00。
const CN_DST={1986:[[5,4],[14,9]],1987:[[12,4],[13,9]],1988:[[17,4],[11,9]],1989:[[16,4],[17,9]],1990:[[15,4],[16,9]],1991:[[14,4],[15,9]]};
function cnDstAdjust(y,mo,d){
  if(!CN_DST[y]) return 0;
  const [[sd,sm],[ed,em]]=CN_DST[y];
  const cur=mo*100+d, st=sm*100+sd, en=em*100+ed;
  return (cur>=st && cur<en) ? 1 : 0; // 在夏令时区间内, 钟拨快1h, 需减1h
}
// 均时差(equation of time, 分钟)。真太阳时与平太阳时之差, 最多约±16分。
// date为UTC, 用简化级数(对占星度级精度足够)。
function equationOfTime(date){
  const n=A.MakeTime(date).tt;               // 自J2000.0的天数(本库tt定义)
  const Ldeg=(280.460+0.9856474*n)%360;      // 太阳平黄经
  const gdeg=(357.528+0.9856003*n)%360;      // 平近点角
  const g=gdeg*Math.PI/180;
  const lambda=(Ldeg+1.915*Math.sin(g)+0.020*Math.sin(2*g))*Math.PI/180; // 真黄经
  const eps=obliquity(date)*Math.PI/180;
  // EoT(弧度)= L - atan2(cos e sin λ, cos λ) ... 标准公式
  let ra=Math.atan2(Math.cos(eps)*Math.sin(lambda),Math.cos(lambda)); // 太阳赤经(弧度)
  let raDeg=ra*180/Math.PI; raDeg=(raDeg%360+360)%360;
  let eotDeg=Ldeg-raDeg; if(eotDeg>180)eotDeg-=360; if(eotDeg<-180)eotDeg+=360;
  return eotDeg*4; // 1度=4分钟 → 返回分钟数
}
// 黄赤交角(度)。注意: 本库 MakeTime().tt = "相对J2000.0的天数"(不是儒略日)
function obliquity(date){
  const T=(A.MakeTime(date).tt)/36525; // 儒略世纪(自J2000)
  return 23.439291-0.0130042*T;
}
// 算上升ASC + 天顶MC (返回黄经0-360)
function calcAscMc(date,lat,lon_east){
  const gast=A.SiderealTime(date);            // 格林尼治视恒星时(小时)
  let ramc=(gast*15+lon_east)%360; if(ramc<0)ramc+=360;  // 本地恒星时=RAMC(度)
  const eps=obliquity(date);
  const rad=Math.PI/180, deg=180/Math.PI;
  const r=ramc*rad, e=eps*rad, phi=lat*rad;
  // MC
  let mc=Math.atan2(Math.sin(r),Math.cos(r)*Math.cos(e))*deg; mc=(mc%360+360)%360;
  // ASC (标准式, 含象限)
  let asc=Math.atan2(Math.cos(r), -(Math.sin(r)*Math.cos(e)+Math.tan(phi)*Math.sin(e)))*deg;
  asc=(asc%360+360)%360;
  return {asc,mc,ramc,eps};
}
// Placidus 宫位制(对标测测/笔记/主流中文占星)。返回12个宫头黄经[1宫..12宫]。
// 已用基准盘(1994/07/24 13:35 九江)逐宫校验, 与测测分秒级吻合。
function placidusCusps(ramcDeg,eps,lat,asc,mc){
  const rad=Math.PI/180,deg=180/Math.PI,e=eps*rad,phi=lat*rad;
  // 牛顿迭代求中间宫头(11,12,2,3)黄经
  function cusp(n){
    let hourAngleSign,F,seed;
    if(n===11){F=1/3;hourAngleSign=1;seed=30;}
    if(n===12){F=2/3;hourAngleSign=1;seed=60;}
    if(n===2){F=2/3;hourAngleSign=-1;seed=120;}
    if(n===3){F=1/3;hourAngleSign=-1;seed=150;}
    let lam=(ramcDeg+seed)%360;
    for(let i=0;i<100;i++){
      const l=lam*rad;
      const decl=Math.asin(Math.sin(e)*Math.sin(l));
      let RA=Math.atan2(Math.sin(l)*Math.cos(e),Math.cos(l))*deg; RA=(RA%360+360)%360;
      const ad=Math.acos(Math.max(-1,Math.min(1,-Math.tan(phi)*Math.tan(decl))))*deg; // 半昼弧
      const MD=hourAngleSign>0? F*ad : F*(180-ad);
      const targetRA=(ramcDeg+(hourAngleSign>0? MD : (180-MD)))%360;
      const diff=((RA-targetRA+540)%360)-180;
      if(Math.abs(diff)<1e-6) break;
      lam=((lam-diff*0.5)%360+360)%360;
    }
    return lam;
  }
  const c11=cusp(11),c12=cusp(12),c2=cusp(2),c3=cusp(3);
  // [1..12]宫头: 1=asc,10=mc,对宫=+180
  return [asc,c2,c3,(mc+180)%360,(c11+180)%360,(c12+180)%360,(asc+180)%360,(c2+180)%360,(c3+180)%360,mc,c11,c12];
}
const SIGN=L=>SIGNS[Math.floor(((L%360)+360)%360/30)];
const DEGIN=L=>{const x=((L%360)+360)%360; const d=x-Math.floor(x/30)*30; return {deg:Math.floor(d),min:Math.floor((d%1)*60)};};

// 进阶点位(纯数学, 不依赖库的小行星星历)。date为UTC。
// 平黑月莉莉丝(月亮远地点平黄经)+ 平北交点(月亮升交点平黄经)。
// 本库 MakeTime().tt 已是"相对J2000.0的天数", 直接/36525得儒略世纪(不再减2451545)
function julianCenturies(date){ return A.MakeTime(date).tt/36525; }
// 平北交点黄经(度): 标准公式(逆行, 约18.6年一周)
function meanNode(date){
  const T=julianCenturies(date);
  let om=125.04452-1934.136261*T+0.0020708*T*T+T*T*T/450000;
  return ((om%360)+360)%360;
}
// 平黑月莉莉丝(月亮远地点黄经, 度)= 月亮近地点黄经+180
function meanLilith(date){
  const T=julianCenturies(date);
  // 月亮近地点黄经 ϖ (perigee, 度)
  let perigee=83.3532465+4069.0137287*T-0.0103200*T*T-T*T*T/80053+T*T*T*T/18999000;
  let lilith=perigee+180;
  return ((lilith%360)+360)%360;
}

// 完整本命盘
function computeNatal(inp){
  // ① 夏令时修正(1986-91中国): 钟面时间拨快了1h, 减回真实民用时间(影响真实UTC瞬间, 必须做)
  const dstH=cnDstAdjust(inp.y,inp.mo,inp.d);
  const utc=toUTC(inp.y,inp.mo,inp.d,inp.h-dstH,inp.mi,inp.tz);
  // 注: 现代占星(含测测)用民用钟表时间直接排盘, 行星位置/上升由真实UTC瞬间决定,
  //     "真太阳时·均时差"不并入计算(那会让行星偏移、反与测测不符)。
  //     均时差仅作"当地真太阳时"参考显示, 不参与排盘。
  const eotMin=equationOfTime(utc);
  const {asc,mc,ramc,eps}=calcAscMc(utc,inp.lat,inp.lon);
  const ascSign=Math.floor(asc/30);
  // Placidus 宫头(对标测测主流)。落宫=判断黄经落在哪两个宫头之间。
  const cusps=placidusCusps(ramc,eps,inp.lat,asc,mc);
  const houseOf=L=>{
    L=((L%360)+360)%360;
    for(let h=0;h<12;h++){
      const a=((cusps[h]%360)+360)%360, b=((cusps[(h+1)%12]%360)+360)%360;
      const span=(b-a+360)%360, off=(L-a+360)%360;
      if(off<span) return h+1;
    }
    return 12;
  };
  const planets=BODIES.map(([n,b])=>{
    const L=lon(b,utc); const dm=DEGIN(L);
    return {n,sign:SIGN(L),signIdx:Math.floor(((L%360)+360)%360/30),deg:dm.deg,min:dm.min,house:houseOf(L),rx:isRx(b,utc),L};
  });
  // 追加凯龙星(Chiron, 来自Moshier库;伤痛与疗愈,本命盘专属,不进三个群运营tab)
  if(typeof chironLon==="function"){
    const cL=chironLon(utc), cdm=DEGIN(cL);
    planets.push({n:"凯龙",sign:SIGN(cL),signIdx:Math.floor(((cL%360)+360)%360/30),deg:cdm.deg,min:cdm.min,house:houseOf(cL),rx:false,L:cL});
  }
  // 本命相位(复用ASPECTS逻辑)
  const asp=[];
  for(let i=0;i<planets.length;i++)for(let j=i+1;j<planets.length;j++){
    let dd=Math.abs(planets[i].L-planets[j].L)%360; if(dd>180)dd=360-dd;
    for(const[a,nm,orb,cls]of ASPECTS){if(Math.abs(dd-a)<=orb){asp.push({t:`${planets[i].n}${nm}${planets[j].n}`,cls});break;}}
  }
  // 四轴
  const dm_asc=DEGIN(asc),dm_mc=DEGIN(mc),dsc=(asc+180)%360,ic=(mc+180)%360,dm_dsc=DEGIN(dsc),dm_ic=DEGIN(ic);
  const angles={
    asc:{sign:SIGN(asc),deg:dm_asc.deg,min:dm_asc.min,L:asc},
    mc:{sign:SIGN(mc),deg:dm_mc.deg,min:dm_mc.min,L:mc},
    dsc:{sign:SIGN(dsc),deg:dm_dsc.deg,L:dsc},
    ic:{sign:SIGN(ic),deg:dm_ic.deg,L:ic}
  };
  // Placidus 12宫(每宫头带具体度数)
  const houses=[];for(let k=0;k<12;k++){const cdm=DEGIN(cusps[k]);houses.push({num:k+1,sign:SIGN(cusps[k]),deg:cdm.deg,min:cdm.min,L:cusps[k]});}
  // 进阶点位: 北交点/南交点/莉莉丝(纯数学算)
  const nodeL=meanNode(utc), lilithL=meanLilith(utc), southL=(nodeL+180)%360;
  const mkPt=(n,L)=>{const dm=DEGIN(L);return {n,sign:SIGN(L),deg:dm.deg,min:dm.min,house:houseOf(L),L};};
  const points=[ mkPt("北交点",nodeL), mkPt("南交点",southL), mkPt("莉莉丝",lilithL) ];
  return {meta:inp,utc,planets,asp,angles,houses,points,ascSign,cusps,dstH,eotMin};
}

// 生日：年/月/日三下拉（直接滚选，不弹iOS日历、不打勾、不退出）
function initDateSelect(){
  const yS=document.getElementById("bY"),mS=document.getElementById("bM"),dS=document.getElementById("bD");
  if(!yS||yS.options.length) return;
  const opt=(v,t)=>`<option value="${v}">${t}</option>`;
  let yh='<option value="">年</option>'; for(let y=2025;y>=1950;y--) yh+=opt(y,y+"年");
  let mh='<option value="">月</option>'; for(let m=1;m<=12;m++) mh+=opt(m,m+"月");
  yS.innerHTML=yh; mS.innerHTML=mh;
  function fillDays(){
    const y=+yS.value||2000,m=+mS.value||1, dim=new Date(y,m,0).getDate();
    const cur=dS.value; let dh='<option value="">日</option>';
    for(let d=1;d<=dim;d++) dh+=opt(d,d+"日");
    dS.innerHTML=dh; if(cur&&+cur<=dim) dS.value=cur;
  }
  fillDays(); yS.onchange=fillDays; mS.onchange=fillDays;
}

// 省市区三级联动
function initCitySelect(){
  const D=window.CITY_DATA||{};

  const fill=(sel,arr,ph)=>{sel.innerHTML=`<option value="">${ph}</option>`+arr.map(x=>`<option value="${x}">${x}</option>`).join('');};

function doCalcNatal(){
  const _y=document.getElementById("bY").value,_m=document.getElementById("bM").value,_d=document.getElementById("bD").value;
  const dateStr=(_y&&_m&&_d)?`${_y}-${String(_m).padStart(2,'0')}-${String(_d).padStart(2,'0')}`:"";
  const timeStr=document.getElementById("bTime").value||"12:00";
  if(!dateStr){alert("请先填出生日期");return;}
  const [y,mo,d]=dateStr.split("-").map(Number);
  const [h,mi]=timeStr.split(":").map(Number);
  const tz=parseFloat(document.getElementById("bTz").value);
  const D=window.CITY_DATA||{};
  const prov=document.getElementById("bProv").value,city=document.getElementById("bCity2").value,dist=document.getElementById("bDist").value;
  let lat,lon,cityName="";
  if(prov&&city&&dist&&D[prov]&&D[prov][city]&&D[prov][city][dist]){
    [lat,lon]=D[prov][city][dist]; cityName=`${prov}${city}${dist}`;
  }else{
    // 兜底: 手填经纬度(海外/找不到)
    lat=parseFloat(document.getElementById("bLat").value);
    lon=parseFloat(document.getElementById("bLon").value);
    if(isNaN(lat)||isNaN(lon)){alert("请选择完整的省/市/区，或点“手填经纬度”输入(海外出生)");return;}
    cityName=`${lat.toFixed(2)},${lon.toFixed(2)}`;
  }
  if(Math.abs(lat)>66){alert("高纬度地区上升点计算精度会下降，结果仅供参考");}
  const sex=document.querySelector("#bSex .opt.on").dataset.v;
  const inp={y,mo,d,h,mi,tz,lat,lon,city:cityName||`${lat},${lon}`,sex};
  natalResult=computeNatal(inp);
  renderNatalResult(natalResult);
  buildNatalPrompt(natalResult);
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// 轻量 Markdown 渲染(先 esc 防 XSS, 再按行解析标题/列表/引用/分隔, 行内处理加粗/斜体)
function mdToHtml(src){
  // 行内: 加粗 **x** / 斜体 *x* (在已 esc 的文本上做, 安全)
  const inline=t=>esc(t)
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*]+)\*([^*]|$)/g,'$1<em>$2</em>$3');
  const lines=src.split('\n');
  let html='', inList=false;
  const closeList=()=>{ if(inList){html+='</ul>';inList=false;} };
  for(let raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(/^\s*$/.test(line)){ closeList(); continue; }
    let m;
    if(/^\s*---+\s*$/.test(line)){ closeList(); html+='<hr class="md-hr">'; continue; }
    if((m=line.match(/^(#{1,6})\s+(.*)$/))){ closeList(); const lv=Math.min(m[1].length,4); html+=`<div class="md-h md-h${lv}">${inline(m[2])}</div>`; continue; }
    if((m=line.match(/^\s*>\s?(.*)$/))){ closeList(); html+=`<blockquote class="md-q">${inline(m[1])}</blockquote>`; continue; }
    if((m=line.match(/^\s*[-*]\s+(.*)$/))){ if(!inList){html+='<ul class="md-ul">';inList=true;} html+=`<li>${inline(m[1])}</li>`; continue; }
    closeList(); html+=`<p class="md-p">${inline(line)}</p>`;
  }
  closeList();
  return html;
}

// 盘指纹:出生数据→稳定哈希ID(唯一锚点,不含隐私明文; 同盘任何设备任何时候都得同一个ID)
function panFingerprint(N){
  const m=N.meta;
  const s=`${m.y}-${m.mo}-${m.d}-${m.h}-${m.mi}-${m.tz}-${(m.lat||0).toFixed(2)}-${(m.lon||0).toFixed(2)}-${m.sex}`;
  let h=5381; for(let i=0;i<s.length;i++){ h=((h<<5)+h+s.charCodeAt(i))>>>0; }
  return "p"+h.toString(36);
}

    +`行星与凯龙（落座·落宫，含凯龙=此生最深的伤口与由伤生出的疗愈天赋）：\n${planetStr}\n`

    +`进阶点位：${N.points.map(pt=>`${pt.n}${pt.sign}${pt.deg}°第${pt.house}宫`).join(" / ")}（北交=此生功课方向、南交=带来的旧惯性、莉莉丝=隐秘欲望与不被驯服的部分）\n`
    +`十二宫（Placidus宫制）：${houseStr}\n`
    +`本命相位：${N.asp.map(x=>x.t).join(" / ")}`;
  // 元素配比(给后端判身位调语气): 统计十大行星落座的火土风水
  const cnt={火:0,土:0,风:0,水:0};
  P.forEach(p=>{const e=ELEMENT[p.sign]; if(e)cnt[e]++;});
  return {
    data,
    sex:m.sex,
    elements:cnt,
    sunSign:P[0].sign, moonSign:P[1].sign, ascSign:a.asc.sign
  };
}

/* ===== 功德+1 隐性机关 ===== */
/* 轻点上方触点→金字「功德+1」上浮+换一张神仙虾背景(双层交叉淡入，不黑屏)。
   不明说，是给好奇者的彩蛋，目的=让人多停留。功德只是体感，永不返利、不与金钱传导。 */
(function(){
  var POOL = [
    "视觉素材/观照_撩水.webp",
    "视觉素材/观照_捧莲.webp",
    "视觉素材/观照_回眸.webp",
    "视觉素材/观照_合十.webp",
    "视觉素材/观照_蹲撩.webp",
    "视觉素材/观照_踏莲.webp",
    "视觉素材/观照_龙池.webp"
  ];
  POOL.forEach(function(u){ var im=new Image(); im.src=u; });   // 预加载，换图不卡
  var skinA=document.getElementById('skinA');
  var skinB=document.getElementById('skinB');
  var top=skinA;                 // 当前在上层显示的
  var idx=0;                     // 当前图(0=撩水，与CSS初始一致)
  function swapBg(){
    idx=(idx+1)%POOL.length;
    var next=(top===skinA)?skinB:skinA;
    next.style.backgroundImage="url('"+POOL[idx]+"')";
    next.style.opacity='0'; void next.offsetWidth;   // reflow确立过渡起点
    next.style.opacity='1';                          // 新层淡入
    top.style.opacity='0';                           // 旧层淡出
    top=next;
  }
  var pop=document.getElementById('meritPop');
  var dot=document.getElementById('meritDot');
  function tapMerit(){
    swapBg();
    pop.classList.remove('go'); void pop.offsetWidth; pop.classList.add('go');
  }
  dot.addEventListener('click', tapMerit);
})();
</script>
