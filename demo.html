<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@font-face{font-family:xjcn;src:url(字体子集/北魏楷书_玄玑.woff2);font-display:block}
@font-face{font-family:xjen;src:url(字体子集/Roschild_英文.woff2);font-display:block}
*{margin:0;padding:0;box-sizing:border-box;
  -webkit-tap-highlight-color:transparent} /* 干掉手机点击的黑框/灰框 */
button{-webkit-tap-highlight-color:transparent;outline:none;-webkit-appearance:none;appearance:none}
button:focus,button:focus-visible{outline:none}
html,body{height:100%;overflow:hidden}
.hero{position:relative;width:100%;height:100vh;overflow:hidden}
.bgvid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:0;transition:opacity 1s ease;
  background:url(视觉素材/主视觉底图.png) center top/cover no-repeat}
.layer{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:column;align-items:center}
.title{margin-top:6.5vh;text-align:center;opacity:0;animation:titleIn 1.6s ease-out .6s forwards}
@keyframes titleIn{from{opacity:0;transform:translateY(-14px);filter:blur(6px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
.title .xy{font-family:xjcn;font-size:70px;letter-spacing:16px;
  background:linear-gradient(160deg,#9a6a1a,#f0c668,#7a5310);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 2px 16px rgba(120,80,10,.45);padding-left:16px;animation:glow 4s ease-in-out 2.2s infinite}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(240,200,90,.25))}50%{filter:drop-shadow(0 0 18px rgba(240,200,90,.55))}}
/* 英文:和中文一样的鎏金渐变+一样亮,粗细更细一点(300),只留轻微阴影保可读 */
.title .en{font-family:xjen;font-size:26px;letter-spacing:5px;margin-top:10px;font-weight:600;
  background:linear-gradient(160deg,#9a6a1a,#f0c668,#7a5310);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 1px 4px rgba(80,50,0,.45))}
/* 弹窗:从底部再上移一点(margin-bottom加大=往上抬),仍不挡瀑布 */
.enter{margin-top:auto;margin-bottom:14vh;width:90%;max-width:440px;
  padding:34px 28px 30px;text-align:center;border-radius:50%/40%;
  background:radial-gradient(120% 90% at 50% 45%, rgba(255,246,222,.42) 0%, rgba(255,240,205,.22) 38%, rgba(255,235,195,.08) 62%, transparent 80%);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;animation:cardIn 1.4s cubic-bezier(.2,.8,.2,1) 1.4s forwards}
@keyframes cardIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:translateY(0)}}
.enter .slogan{font-family:-apple-system,"PingFang SC";color:#fff;font-size:21px;letter-spacing:3px;margin-bottom:22px;line-height:1.65;font-weight:700;text-shadow:0 1px 3px rgba(45,28,0,.85),0 0 10px rgba(235,195,90,.3)}
.enter .btn{display:block;width:76%;margin:0 auto;padding:20px 24px;border:0;border-radius:50%/50%;
  background:linear-gradient(120deg,#c79236,#f0c668);color:#3a2a08;
  font-family:xjen;font-size:21px;font-weight:700;letter-spacing:5px;transition:.2s;cursor:pointer;
  box-shadow:0 6px 22px rgba(150,100,20,.35)}
.enter .btn:active{transform:scale(.97);box-shadow:0 0 24px rgba(240,200,90,.6)}

/* ===== 觉醒特效（纯视觉，不跳转）===== */
/* 1. 字爆亮：光从笔画里透出来——字色被点成纯亮金白 + 多层辉光，是"字在发光"而非贴方块 */
.slogan.awaken{animation:sloganFlare 1.5s ease-out forwards}
@keyframes sloganFlare{
  0%{color:#fff;
     text-shadow:0 1px 3px rgba(45,28,0,.85),0 0 10px rgba(235,195,90,.3)}
  16%{transform:scale(1.05);color:#fffdf2;
     text-shadow:0 0 8px rgba(255,250,235,1),0 0 20px rgba(255,235,160,1),0 0 40px rgba(255,210,100,.95),0 0 70px rgba(255,195,80,.6)}
  50%{transform:scale(1.02);color:#fff8e6;
     text-shadow:0 0 6px rgba(255,248,225,.9),0 0 16px rgba(255,228,150,.85),0 0 34px rgba(255,205,95,.6)}
  100%{transform:scale(1);color:#fff;
     text-shadow:0 1px 3px rgba(45,28,0,.85),0 0 14px rgba(245,210,120,.5)}
}
/* 2. 按钮觉醒：光晕扩一下（比字弱，先字后钮的层级） */
.btn.awaken{animation:btnPulse 1.32s ease-out forwards}
@keyframes btnPulse{
  0%{box-shadow:0 6px 22px rgba(150,100,20,.35)}
  30%{box-shadow:0 0 30px rgba(240,200,90,.55),0 0 60px rgba(240,200,90,.3)}
  100%{box-shadow:0 6px 22px rgba(150,100,20,.35)}
}
/* 觉醒 = 纯字体发光，不要任何"贴上去的方块/光膜" */
</style></head><body>
<div class="hero">
  <video class="bgvid" id="bgv" loop muted playsinline preload="auto" poster="视觉素材/主视觉底图.png">
    <source src="视觉素材/主视觉_仙阁_长.mp4" type="video/mp4">
  </video>
  <div class="layer">
    <div class="title"><div class="xy">玄玑</div><div class="en">Astrology</div></div>
        <div class="enter">
      <div class="slogan" id="slogan">游戏赢家，从不做 NPC</div>
      <button class="btn" id="awakenBtn">AWAKEN</button>
    </div>
  </div>
</div>


<script>
(function(){
  var v=document.getElementById('bgv');
  if(!v)return;
  function start(){ v.style.opacity='1'; var p=v.play(); if(p&&p.catch)p.catch(function(){}); }
  if(v.readyState>=3){ start(); }
  else { v.addEventListener('canplaythrough', start, {once:true});
         setTimeout(start, 2500); } // 兜底:2.5秒后无论如何都播
})();

/* ===== AWAKEN 觉醒：先字亮 → 后钮晕 → 全屏光浪（不跳转，过场种子）===== */
(function(){
  var btn=document.getElementById('awakenBtn');
  var slogan=document.getElementById('slogan');
  if(!btn)return;
  btn.addEventListener('click',function(){
    // 重置（允许反复点）
    slogan.classList.remove('awaken'); btn.classList.remove('awaken');
    void slogan.offsetWidth; void btn.offsetWidth; // 强制回流，重启动画
    // 字先亮（0ms，比按钮亮），钮稍后晕（120ms）——觉醒=纯字体/按钮自身发光
    slogan.classList.add('awaken');
    setTimeout(function(){ btn.classList.add('awaken'); }, 120);
    /* TODO 觉醒后这里接「跳排盘 / 水镜显影 / 神仙虾睁眼」——待 Athena 商讨 */
  });
})();
</script>
</body></html>
