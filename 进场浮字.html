<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
@font-face{font-family:"beiwei";src:url("字体子集/北魏楷书_玄玑.woff2") format("woff2");font-display:swap}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000}
.stage{position:relative;width:100%;height:100vh;overflow:hidden}

/* 背景：每屏换景，交叉淡入。两层叠放轮流切图，实现柔和过渡 */
.bg{position:absolute;inset:0;background-position:center;background-size:cover;background-repeat:no-repeat;
  transform:scale(1.05);animation:slowpush 24s ease-in-out infinite alternate;
  opacity:0;transition:opacity 1.1s ease}
.bg.on{opacity:1}
@keyframes slowpush{from{transform:scale(1.05)}to{transform:scale(1.12)}}
/* 轻压暗，让月白字浮起来（背景仍清晰=两不误） */
.veil{position:absolute;inset:0;
  background:radial-gradient(120% 90% at 50% 45%, transparent 30%, rgba(8,6,2,.45) 100%);
  pointer-events:none}

/* 浮字层：屏中一整块圆角暗底光屏，字横排浮于其上 */
.scroll{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;
  width:84vw;max-width:560px;
  /* 高度由内容决定，但限最大高，绝不被撑成长条；超出则内部不显（逐句呈现本就一次1~2句） */
  max-height:62vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px 30px;
  /* 一整块：半透明暗底 + 柔光描边，背景仍隐隐透出 */
  background:rgba(10,7,3,.46);
  border:1px solid rgba(235,210,150,.20);
  border-radius:26px;
  box-shadow:0 0 50px rgba(0,0,0,.35),inset 0 0 60px rgba(255,245,220,.05);
  backdrop-filter:blur(3px);
  pointer-events:none;text-align:center;
  transition:opacity .32s ease}
.scroll.fade{opacity:0}
.col{
  font-family:"beiwei",serif;
  font-size:clamp(17px,4.9vw,21px);line-height:1.8;letter-spacing:1.5px;
  /* 月白字浮于暗底之上 */
  color:#fbf7ee;
  text-shadow:0 1px 4px rgba(8,5,1,.7),0 0 16px rgba(255,250,235,.12);
  opacity:0;filter:blur(4px);max-width:100%}
/* 重点字：暖金点亮，像命书上自己发光的字 */
.col em{
  font-style:normal;
  color:#ffe6a8;
  text-shadow:0 0 10px rgba(255,220,130,.9),0 0 22px rgba(255,200,90,.55),0 1px 3px rgba(60,38,8,.6);}
.col.show{animation:floatIn .5s ease-out forwards}
@keyframes floatIn{
  0%{opacity:0;filter:blur(6px);transform:translateY(12px)}
  100%{opacity:1;filter:blur(0);transform:translateY(0)}
}

.skip{position:absolute;right:18px;bottom:16px;z-index:4;
  font-family:"beiwei",serif;font-size:13px;letter-spacing:2px;
  color:rgba(248,242,228,.6);border:1px solid rgba(248,242,228,.28);
  padding:5px 13px;border-radius:14px;background:rgba(0,0,0,.18);
  backdrop-filter:blur(2px)}
/* 轻触提示：呼吸闪烁，引导手动翻页 */
.hint{position:absolute;left:0;right:0;bottom:58px;z-index:3;text-align:center;
  font-family:"beiwei",serif;font-size:13px;letter-spacing:3px;
  color:rgba(255,240,205,.7);pointer-events:none;
  animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{0%,100%{opacity:.35}50%{opacity:.9}}
/* 页码点 */
.dots{position:absolute;left:0;right:0;bottom:34px;z-index:3;
  display:flex;gap:7px;justify-content:center;pointer-events:none}
.dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,235,190,.28);
  transition:all .3s}
.dots span.on{background:rgba(255,225,150,.95);box-shadow:0 0 8px rgba(255,210,110,.8);width:18px;border-radius:3px}
</style></head><body>
<div class="stage" id="stage">
  <div class="bg" id="bgA"></div>
  <div class="bg" id="bgB"></div>
  <div class="veil"></div>
  <div class="scroll" id="scroll"></div>
  <div class="hint" id="hint">轻触继续 ›</div>
  <div class="dots" id="dots"></div>
  <div class="skip" id="skip">跳过 ›</div>
</div>
<script>
(function(){
  // 入场叙事正本（前8句=Athena润版 + 镜前⑨⑩⑪），按「段」组织，每段配自己的背景换景。
  // 龙现身段不在进场（挪到解读等待）。正本：线C-玄玑IP/入场叙事·正本.md
  // 重点字 <em> 描金点亮。
  var sections = [
    { bg:"视觉素材/起源_混沌月莲.webp", lines:[
      "据说，在盘古开天辟地之前……",
      "宇宙洪荒，一片混沌。于无尽的黑洞之中，似有<em>秩序</em>，似有<em>数列</em>、<em>逻辑</em>、与<em>熵</em>。"
    ]},
    { bg:"视觉素材/月影_弯月漩涡.webp", lines:[
      "然而，在混沌中浮现了一些「<em>跃影</em>」——它们是宇宙的反射，是星体的化身。先于光，先于名。它们，本就在那里。",
      "其中有一道影，应<em>月亮</em>而生。月亮照而不灼，映而不占——它便也生得一副「<em>只照见、不判决</em>」的性子。"
    ]},
    { bg:"视觉素材/天庭_仙阁.webp", lines:[
      "后来有了三界。于无上无色界天中，又有了<em>天庭</em>，于是诸神归位，万法归宗。",
      "而它，有缘在天庭里一座极僻静的<em>仙阁</em>中栖下。"
    ]},
    { bg:"视觉素材/命书_古树.webp", lines:[
      "此阁悬于云端天湖，瑶阁中似有一架架望不到尽头的<em>命书</em>。"
    ]},
    { bg:"视觉素材/白莲水廊.webp", lines:[
      "此刻，微风过处，<em>白莲沁鼻</em>，<em>声如潮水</em>……"
    ]},
    { bg:"视觉素材/水镜.webp", lines:[
      "你定睛一看——这阁的中央，竟悬着一面<em>明镜</em>。",
      "你不由惊叹：「嘶~这为何物？」可你走近才发现……",
      "那竟不是镜，是一汪<em>立起来的星河水</em>。再走近一点——水里，竟又是一重天。"
    ]}
  ];
  var pages = sections.map(function(s){ return s.lines; });
  var bgs   = sections.map(function(s){ return s.bg; });
  var bgA = document.getElementById('bgA');
  var bgB = document.getElementById('bgB');
  var bgTop = bgA;   // 当前在上层显示的
  function setBg(idx){
    var url = bgs[idx] || bgs[bgs.length-1];
    var next = (bgTop === bgA) ? bgB : bgA;   // 用另一层装新图，淡入盖上
    next.style.backgroundImage = "url('" + url + "')";
    next.classList.add('on');
    bgTop.classList.remove('on');
    bgTop = next;
  }
  // ⭐预加载所有背景图：页面一开就下载进缓存，翻页时秒切不卡顿
  bgs.forEach(function(u){ var im = new Image(); im.src = u; });

  var scroll = document.getElementById('scroll');
  var dots   = document.getElementById('dots');
  var hint   = document.getElementById('hint');
  var STEP = 1500;   // 屏内逐行浮现间隔（默认自动慢浮，营造仙气）
  var cur = -1;
  var curCols = [];      // 当前屏的句子节点
  var timers = [];       // 当前屏排队中的浮现定时器
  var allShown = false;  // 当前屏是否已全部浮现

  // 页码点
  pages.forEach(function(){ var s=document.createElement('span'); dots.appendChild(s); });
  function markDot(){ [].forEach.call(dots.children,function(s,i){ s.className = i===cur?'on':''; }); }

  function clearTimers(){ timers.forEach(clearTimeout); timers = []; }

  function renderPage(idx){
    clearTimers();
    allShown = false;
    setBg(idx);   // 跟着正文换背景（交叉淡入）
    scroll.classList.remove('fade'); void scroll.offsetWidth;
    scroll.innerHTML = '';
    curCols = pages[idx].map(function(t){
      var d=document.createElement('div'); d.className='col'; d.innerHTML=t;
      scroll.appendChild(d); return d;
    });
    // 默认：不点也会一行一行自动浮现
    curCols.forEach(function(c,i){
      timers.push(setTimeout(function(){
        c.classList.add('show');
        if(i === curCols.length-1) allShown = true;   // 最后一行浮完=本屏全显
      }, 300 + i*STEP));
    });
    markDot();
    hint.textContent = (idx>=pages.length-1) ? '轻触，入镜 ›' : '轻触继续 ›';
  }

  // 把当前屏立即全部显出（快进）
  function revealAll(){
    clearTimers();
    curCols.forEach(function(c){ c.classList.add('show'); });
    allShown = true;
  }

  // 轻触：本屏没浮完→快进当前屏；已浮完→翻下一屏（下一屏仍自动慢浮）
  var turning = false;   // 翻页过渡锁，防连点穿透多翻一段
  function tap(){
    if(turning) return;
    if(!allShown){ revealAll(); return; }
    if(cur < pages.length-1){
      turning = true;
      cur++;
      scroll.classList.add('fade');
      setTimeout(function(){ renderPage(cur); turning = false; }, 320);
    } else {
      done();   // 末屏已全显，再触即进入
    }
  }

  function done(){
    // TODO 接「转场 → 星河水镜 → 排盘」——待 Athena 串整条动线
    document.getElementById('skip').textContent = '（此处接：排盘）';
  }

  // 首屏（自动慢浮）
  cur = 0; renderPage(0);

  // 轻触：点屏幕 / 上划
  document.getElementById('stage').addEventListener('click', function(e){
    if(e.target.id==='skip') return;
    tap();
  });
  var ty=0;
  document.getElementById('stage').addEventListener('touchstart',function(e){ ty=e.touches[0].clientY; },{passive:true});
  document.getElementById('stage').addEventListener('touchend',function(e){
    if(ty - e.changedTouches[0].clientY > 40) tap();   // 上划同轻触
  },{passive:true});

  // 跳过：整段直接进排盘
  document.getElementById('skip').addEventListener('click', function(e){
    e.stopPropagation(); clearTimers(); done();
  });
})();
</script>
</body></html>
